<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Chat Module</title>
    <!-- <link rel="stylesheet" href="style.css"> -->
</head>


<body>
    <div class="chat-container">
        <div class="chat-box" id="chat-box"></div>

        <input type="text" id="user-input" placeholder="Type your message...">
        <button onclick="sendMessage()">Send</button>
    </div>
   <style>
    body {
    font-family: Arial, sans-serif;
    background-color: #f2f2f2;
    display: flex;
    justify-content:center;
    align-items: center;
    height: 100vh;
}

/* Chat container */
.chat-container {
    width: 400px;
    background: white;
    border-radius: 10px;
    padding: 15px;
    box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
}

/* Chat display box */
.chat-box {
    height: 300px;
    border: 1px solid #ccc;
    border-radius: 8px;
    padding: 10px;
    overflow-y: auto;
    margin-bottom: 10px;
    background-color: #fafafa;
}

/* Messages */
.message {
    padding: 8px 12px;
    margin: 6px 0;
    border-radius: 10px;
    max-width: 70%;
}

/* User message */
.user {
    background-color: #d1e7dd;
    margin-left: auto;
}

/* Bot message */
.bot {
    background-color: #e2e3e5;
}

/* Input box */
#user-input {
    width: 70%;
    padding: 8px;
    border-radius: 5px;
    border: 1px solid #ccc;
}

/* Send button */
button {
    padding: 8px 12px;
    border: none;
    background-color: #007bff;
    color: white;
    border-radius: 5px;
    cursor: pointer;
}

button:hover {
    background-color: #0056b3;
}
   </style>
    <script src="chat.js"></script>
</body>
</html>
